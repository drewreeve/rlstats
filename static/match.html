<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Detail — RL Stats</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="noise"></div>

    <header>
        <div class="header-inner">
            <div class="logo-block">
                <div class="logo-accent"></div>
                <h1>RL STATS</h1>
                <span class="logo-sub">DREW / STEVE / JEFF</span>
            </div>
            <div class="mode-nav-wrap">
                <nav class="mode-nav">
                    <a href="/" class="mode-btn">
                        <span class="mode-label">3v3</span>
                        <span class="mode-indicator"></span>
                    </a>
                    <a href="/2v2" class="mode-btn">
                        <span class="mode-label">2v2</span>
                        <span class="mode-indicator"></span>
                    </a>
                    <a href="/hoops" class="mode-btn">
                        <span class="mode-label">HOOPS</span>
                        <span class="mode-indicator"></span>
                    </a>
                    <a href="/history" class="mode-btn">
                        <span class="mode-label">HISTORY</span>
                        <span class="mode-indicator"></span>
                    </a>
                    <a href="/upload" class="mode-btn">
                        <span class="mode-label">UPLOAD</span>
                        <span class="mode-indicator"></span>
                    </a>
                </nav>
            </div>
        </div>
        <div class="header-stripe"></div>
    </header>

    <main class="match-detail">
        <div id="match-content"></div>
    </main>

    <script src="/match.js"></script>
</body>
</html>
