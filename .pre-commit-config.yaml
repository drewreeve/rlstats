repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run --frozen ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: uv run --frozen ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run --frozen mypy .
        language: system
        types: [python]
        pass_filenames: false

      - id: pyright
        name: pyright
        entry: uv run --frozen pyright
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
